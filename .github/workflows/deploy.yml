name: Deploy to Flowhesive

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /tmp/flowhesive-src
            git pull origin master
            npm install
            npm run build
            docker build -t flowhesive:latest . -f Dockerfile
            docker stop flowhesive || true
            docker rm flowhesive || true
            docker run -d \
              --name flowhesive \
              -p 3003:80 \
              --restart unless-stopped \
              flowhesive:latest
